services:
  db:
    image: postgres:15
    container_name: learning_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: yandex_test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Вот эта магия: связываем твой локальный файл с папкой автозапуска в Docker
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: